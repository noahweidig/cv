name: Rebuild CV

on:
  schedule:
    - cron: '0 6 1,15 * *'   # 1st & 15th of every month, 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'template/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: pip install requests pyyaml jinja2

      - name: Install TeX Live
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-texgyre

      - name: Fetch data & render template
        run: python scripts/build.py

      - name: Compile PDF (2 passes)
        run: |
          xelatex -interaction=nonstopmode -halt-on-error cv.tex
          xelatex -interaction=nonstopmode -halt-on-error cv.tex

      - name: Move PDF to output/
        run: |
          mkdir -p output
          cp cv.pdf output/cv.pdf

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/cv.pdf cv.tex
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "auto: rebuild CV $(date -u +%Y-%m-%d)"
          git push
